<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Prediction Platform</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #map {
            height: 100vh; /* ขยายแผนที่ให้เต็มจอ */
            width: 100%;
        }
        .container {
            width: 50%;
            margin: 20px auto;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Flood Prediction Platform</h1>
        <label for="location">Enter Location: </label>
        <input type="text" id="location" placeholder="e.g., Chiang Mai">
        <button onclick="getLocation()">Get Flood Prediction</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        window.onload = function() {
            // Create map with default location
            const map = L.map('map').setView([13.10, 100.10], 10); // Default to Chiang Mai
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            // Function to fetch latitude and longitude from the location name
            async function getLocation() {
                const locationName = document.getElementById('location').value;
                
                const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${locationName}&format=json&limit=1`);
                const data = await response.json();

                if (data && data.length > 0) {
                    const lat = data[0].lat;
                    const lon = data[0].lon;

                    console.log('Latitude:', lat);
                    console.log('Longitude:', lon);

                    // Set map view to the location found
                    map.setView([lat, lon], 12); // Zoom in on the location

                    // Add Marker to the map
                    L.marker([lat, lon]).addTo(map)
                        .bindPopup(`<b>${locationName}</b><br>Lat: ${lat}, Lon: ${lon}`)
                        .openPopup();

                    // Fetch flood prediction data
                    fetchFloodPrediction(lat, lon);
                } else {
                    alert("Location not found, please try again.");
                }
            }

            // Function to fetch flood prediction data
            async function fetchFloodPrediction(lat, lon) {
                const apiUrl = `https://data.tmd.go.th/nwpapi/v1/forecast/location/hourly?lat=${lat}&lon=${lon}&fields=tc,rh&date=2022-08-17&hour=8&duration=2`;
                const apiKey = 'YOUR_ACCESS_TOKEN';  // Insert your API Key here

                try {
                    const response = await fetch(apiUrl, {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${apiKey}`,
                            'Accept': 'application/json'
                        }
                    });

                    const data = await response.json();

                    // Show flood risk area (blue circle)
                    L.circle([lat, lon], {
                        color: 'blue',
                        fillColor: 'blue',
                        fillOpacity: 0.4,
                        radius: 3000  // Adjust radius based on flood depth
                    }).addTo(map).bindPopup(`Flood Risk Area: Depth ${data.tc} cm`);

                    // Show direction of water flow (red arrow)
                    L.polyline([
                        [lat, lon], 
                        [lat + 0.02, lon + 0.02]  // Example of water flow direction
                    ], {color: 'red', weight: 3, opacity: 0.7}).addTo(map);

                    // Add an arrow marker to show direction
                    L.marker([lat + 0.02, lon + 0.02], {icon: L.divIcon({
                        className: 'leaflet-div-icon',
                        html: '<span style="font-size: 20px; color: red;">&#8594;</span>'
                    })}).addTo(map);
                } catch (error) {
                    console.error('Error fetching data:', error);
                }
            }
        };
    </script>
</body>
</html>

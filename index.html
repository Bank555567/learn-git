<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Prediction Platform</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #map {
            height: 100vh; /* ขยายแผนที่ให้เต็มจอ */
            width: 100%;
        }
        .container {
            width: 50%;
            margin: 20px auto;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Flood Prediction Platform</h1>
        <label for="location">Enter Location: </label>
        <input type="text" id="location" placeholder="e.g., Chiang Mai">
        <button id="locationButton">Get Location</button>
        <button onclick="getFloodPrediction()">Get Flood Prediction</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([13.10, 100.10], 10); // Default to Chiang Mai
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Function to fetch and display location using Geolocation API
        function getLocation() {
            console.log("getLocation function called!");
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(showPosition, showError);
            } else {
                console.log("Geolocation is not supported by this browser.");
            }
        }

        // Function to display the position on the map
        function showPosition(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            console.log("Latitude: " + lat);
            console.log("Longitude: " + lon);

            // Set map view to the current position
            map.setView([lat, lon], 12); // Zoom in on the current position

            // Add a marker to the map
            L.marker([lat, lon]).addTo(map)
                .bindPopup(`<b>Your Location</b><br>Lat: ${lat}, Lon: ${lon}`)
                .openPopup();
        }

        // Error handling if geolocation fails
        function showError(error) {
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    alert("User denied the request for Geolocation.");
                    break;
                case error.POSITION_UNAVAILABLE:
                    alert("Location information is unavailable.");
                    break;
                case error.TIMEOUT:
                    alert("The request to get user location timed out.");
                    break;
                case error.UNKNOWN_ERROR:
                    alert("An unknown error occurred.");
                    break;
            }
        }

        // Function to simulate flood prediction and create flood risk area on the map
        function getFloodPrediction() {
            const locationName = document.getElementById('location').value;
            if (!locationName) {
                alert('Please enter a location');
                return;
            }

            // Simulate fetching flood risk area and prediction data (in real case, fetch from API)
            const lat = 13.10;  // Simulated latitude
            const lon = 100.10; // Simulated longitude
            const floodDepth = 30; // Simulated flood depth (in cm)

            // Create flood risk area (blue circle)
            L.circle([lat, lon], {
                color: 'blue',
                fillColor: 'blue',
                fillOpacity: 0.4,
                radius: floodDepth * 100  // Radius based on flood depth
            }).addTo(map).bindPopup(`Flood Risk Area: Depth ${floodDepth} cm`);

            // Example of showing water flow direction (red arrow)
            L.polyline([
                [lat, lon], 
                [lat + 0.02, lon + 0.02]  // Example of water flow direction
            ], {color: 'red', weight: 3, opacity: 0.7}).addTo(map);

            // Add an arrow marker to show direction
            L.marker([lat + 0.02, lon + 0.02], {icon: L.divIcon({
                className: 'leaflet-div-icon',
                html: '<span style="font-size: 20px; color: red;">&#8594;</span>'
            })}).addTo(map);
        }

        // Attach event listener to button
        const locationButton = document.getElementById('locationButton');
        locationButton.addEventListener('click', getLocation);
    </script>
</body>
</html>

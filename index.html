<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Prediction Platform</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #map {
            height: 100vh; /* ขยายแผนที่ให้เต็มจอ */
            width: 100%;
        }
        .container {
            width: 50%;
            margin: 20px auto;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Flood Prediction Platform</h1>
        <label for="location">Enter Location: </label>
        <input type="text" id="location" placeholder="e.g., Chiang Mai">
        <button id="locationButton">Get Location</button>
        <button id="predictionButton" disabled>Prediction</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([13.10, 100.10], 10); // Default to Chiang Mai
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        let currentLat = null;
        let currentLon = null;
        let floodRiskArea = null; // เก็บพื้นที่สีฟ้า
        let floodDirection = null; // เก็บทิศทางการไหลของน้ำ
        let currentMarker = null; // เก็บ Marker ของตำแหน่งล่าสุด

        // Function to fetch latitude and longitude from the location name (Nominatim API)
        async function getLocation() {
            console.log("getLocation function called!");
            const locationName = document.getElementById('location').value;

            if (locationName.trim() === "") {
                alert("Please enter a location.");
                return;
            }

            // ใช้ Nominatim API จาก OpenStreetMap เพื่อแปลงชื่อสถานที่เป็นพิกัด
            const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${locationName}&format=json&limit=1`);
            const data = await response.json();

            if (data && data.length > 0) {
                currentLat = data[0].lat;
                currentLon = data[0].lon;

                console.log("Latitude: " + currentLat);
                console.log("Longitude: " + currentLon);

                // ลบ Marker และพื้นที่สีฟ้าเดิม (ถ้ามี)
                if (currentMarker) {
                    map.removeLayer(currentMarker);
                }
                if (floodRiskArea) {
                    map.removeLayer(floodRiskArea);
                }
                if (floodDirection) {
                    map.removeLayer(floodDirection);
                }

                // Set map view to the location found
                map.setView([currentLat, currentLon], 12); // Zoom in on the current location

                // เพิ่ม Marker ใหม่
                currentMarker = L.marker([currentLat, currentLon]).addTo(map)
                    .bindPopup(`<b>${locationName}</b><br>Lat: ${currentLat}, Lon: ${currentLon}`)
                    .openPopup();

                // Enable "Prediction" button after getting location
                document.getElementById('predictionButton').disabled = false;
            } else {
                alert("Location not found. Please try again.");
            }
        }

        // Function to simulate flood prediction and create flood risk area on the map
        function createFloodRiskArea() {
            if (currentLat === null || currentLon === null) {
                alert('Please get location first');
                return;
            }

            // Simulate fetching flood risk area and prediction data (in real case, fetch from API)
            const floodDepth = 30; // Simulated flood depth (in cm)

            // Create flood risk area (blue circle)
            floodRiskArea = L.circle([currentLat, currentLon], {
                color: 'blue',
                fillColor: 'blue',
                fillOpacity: 0.4,
                radius: floodDepth * 100  // Radius based on flood depth
            }).addTo(map).bindPopup(`Flood Risk Area: Depth ${floodDepth} cm`);

            // Example of showing water flow direction (red arrow)
            floodDirection = L.polyline([
                [currentLat, currentLon], 
                [currentLat + 0.02, currentLon + 0.02]  // Example of water flow direction
            ], {color: 'red', weight: 3, opacity: 0.7}).addTo(map);

            // Add an arrow marker to show direction
            L.marker([currentLat + 0.02, currentLon + 0.02], {icon: L.divIcon({
                className: 'leaflet-div-icon',
                html: '<span style="font-size: 20px; color: red;">&#8594;</span>'
            })}).addTo(map);
        }

        // Attach event listener to the "Get Location" button
        const locationButton = document.getElementById('locationButton');
        locationButton.addEventListener('click', getLocation);

        // Attach event listener to the "Prediction" button
        const predictionButton = document.getElementById('predictionButton');
        predictionButton.addEventListener('click', createFloodRiskArea);
    </script>
</body>
</html>
